name: Python CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run Tests
      # Assuming default pytest behavior
      run: pytest tests/

    - name: Notify Telegram on CI Failure
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        MESSAGE="❌ *Akasa CI Failed*%0A"
        MESSAGE+="📦 Repo: \`${{ github.repository }}\`%0A"
        MESSAGE+="🌿 Branch: \`${{ github.ref_name }}\`%0A"
        MESSAGE+="👤 Author: ${{ github.actor }}%0A"
        MESSAGE+="📝 Commit: \`${{ github.event.head_commit.message || github.event.pull_request.title }}\`%0A"
        MESSAGE+="🔗 [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d parse_mode="Markdown" \
          -d text="${MESSAGE}"
