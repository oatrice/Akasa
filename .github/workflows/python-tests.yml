name: Python Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run unit tests
      env:
        OPENROUTER_API_KEY: "dummy-key-for-ci"
      run: |
        pytest tests/ -v --ignore=tests/integration -m "not integration"

    - name: Run integration tests (with real Redis)
      env:
        OPENROUTER_API_KEY: "dummy-key-for-ci"
        REDIS_URL: "redis://localhost:6379"
      run: |
        pytest tests/integration/ -v -m integration
