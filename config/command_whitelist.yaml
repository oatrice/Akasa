# Command Whitelist — Akasa Feature #66
# Defines which commands each local tool daemon is permitted to execute.
# Unknown commands will be rejected with HTTP 400 before anything is enqueued.

tools:
  gemini:
    defaults:
      execution:
        type: cli
        executable: gemini
        global_flag_args: [model]
        internal_args: [fallback_model]
        flag_aliases:
          model: "-m"
        include_command_name: true
        argument_style: flags
        timeout_seconds: 120
        retries: 0
    allowed_commands:
      - name: run_task
        description: "Run a Gemini CLI task"
        allowed_args: [task, pr_number, branch, model, fallback_model]
        execution:
          prompt_arg_key: task
          prompt_context_keys: [pr_number, branch]
      - name: check_status
        description: "Check Gemini CLI status"
        allowed_args: [model, fallback_model]
        execution:
          prompt_template: |
            Status check for Gemini CLI in this workspace.
            Reply in exactly 3 short bullet points:
            - readiness status
            - current model name
            - any quota or authentication limitation that blocks work
            Do not inspect repository files, do not make a plan, and do not suggest code changes.
      - name: list_issues
        description: "List GitHub issues via Gemini"
        allowed_args: [state, label, model, fallback_model]
        execution:
          prompt_template: |
            List GitHub issues relevant to the current repository context.
            State filter: {state}
            Label filter: {label}
            Reply as concise bullet points. If repository context is unavailable, say so briefly.
      - name: summarize_session
        description: "Summarize the current AI session"
        allowed_args: [model, fallback_model]
        execution:
          prompt_template: |
            Summarize the current Gemini CLI session in 5 concise bullet points.
            Include current goal, recent actions, blockers, and a suggested next step.

  luma:
    defaults:
      execution:
        type: cli
        executable: luma
        include_command_name: true
        argument_style: flags
        timeout_seconds: 60
        retries: 0
    allowed_commands:
      - name: update_issue
        description: "Update a Luma issue status"
        allowed_args: [issue_id, status, comment]
      - name: list_issues
        description: "List open Luma issues"
        allowed_args: [project, state]
      - name: create_issue
        description: "Create a new Luma issue"
        allowed_args: [title, description, project]

  zed:
    defaults:
      execution:
        type: cli
        executable: zed
        include_command_name: false
        argument_style: positional
        positional_args: [path]
        path_arg_keys: [path]
        allowed_paths:
          - "/Users/oatrice/Software-projects/Akasa"
        timeout_seconds: 30
        retries: 0
    allowed_commands:
      - name: open_file
        description: "Open a file in Zed IDE"
        allowed_args: [path]
      - name: run_task
        description: "Run a Zed task"
        allowed_args: [task_name]
        execution:
          include_command_name: true
          argument_style: flags
          positional_args: []
          path_arg_keys: []
      - name: show_notification
        description: "Show a notification in Zed IDE"
        allowed_args: [message]
        execution:
          include_command_name: true
          argument_style: flags
          positional_args: []
          path_arg_keys: []

  antigravity:
    defaults:
      execution:
        type: mcp
        transport: stdio
        server_command:
          - "python3"
          - "scripts/akasa_mcp_server.py"
        tool_name_from_command: true
        timeout_seconds: 45
        retries: 2
        backoff_seconds: 1.0
    allowed_commands:
      - name: request_remote_approval
        description: "Request user approval via Akasa MCP server"
        allowed_args: [command, cwd, description]
      - name: notify_pending_review
        description: "Notify user that changes are ready for review"
        allowed_args: [project, task, files_changed, summary]
      - name: notify_task_complete
        description: "Send task completion summary to user"
        allowed_args: [project, task, status, duration, message, link, retry_count, max_retries]

  windsurf:
    defaults:
      execution:
        type: http
        method: POST
        endpoint: "http://localhost:9999/execute"
        headers: {}
        timeout_seconds: 10
        retries: 2
        backoff_seconds: 0.5
        retry_statuses: [429, 500, 502, 503, 504]
        allowed_hosts: [localhost, 127.0.0.1, "::1"]
        payload_mode: envelope
    allowed_commands:
      - name: open_file
        description: "Open a file in Windsurf"
        allowed_args: [path]
      - name: execute_code
        description: "Execute code through Windsurf local API"
        allowed_args: [code, path]
      - name: edit_file
        description: "Apply an edit operation in Windsurf"
        allowed_args: [path, changes]
